aid: hinge-health
name: Hinge Health
description: >-
  Hinge Health is a San Francisco-based digital musculoskeletal (MSK) care
  company founded in 2014 by Daniel Perez and Gabriel Mecklenburg, delivering
  virtual physical therapy, pelvic health, and chronic pain care to enterprise
  health plans, employers, and their members. The platform combines
  on-demand exercise therapy with a multidisciplinary care team — physical
  therapists, health coaches, board-certified physicians, and orthopedic
  specialists — augmented by 3D motion tracking, computer vision, and an
  in-house AI Care Assistant. Hinge Health develops Enso, an FDA-cleared,
  drug-free wearable that delivers proprietary electrical stimulation
  waveforms for pain relief, and operates HingeConnect, an EMR/claims
  interoperability layer that ingests records from more than one million
  external providers across 120,000+ care sites to coordinate care, surface
  surgical and opioid risk, and feed real-time clinical context into the
  digital clinic. The company also runs HingeSelect, a national provider
  network for in-person MSK care, and contracts with all five major US
  national health plans plus employers including Boeing, Salesforce, and
  US Foods. Hinge Health raised more than $1 billion from Insight Partners,
  Tiger Global, Coatue, and Atomico before completing its IPO on the New
  York Stock Exchange under the ticker HNGE on May 22, 2025, pricing at
  $32/share and opening at $39.25 for an initial market capitalization
  above $3 billion. There is no public developer API, SDK, or open-source
  release for Hinge Health, Enso, or HingeConnect — the platform is sold
  as a managed clinical service to health plans and employers, and the
  HingeConnect interoperability surface is operated internally rather than
  exposed to third-party developers.
